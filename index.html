<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genesis Protocol Dashboard | Saikou.tech</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%);
            color: #ffffff;
            min-height: 100vh;
        }
        
        .header {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
        }
        
        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-size: 2rem;
            font-weight: bold;
            background: linear-gradient(45deg, #00f5ff, #ff00aa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
        }
        
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #00ff00;
            box-shadow: 0 0 10px #00ff00;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        
        .dashboard-title {
            text-align: center;
            margin: 2rem 0;
        }
        
        .dashboard-title h1 {
            font-size: 3rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(45deg, #00f5ff, #ff00aa, #ffaa00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .dashboard-title p {
            font-size: 1.2rem;
            opacity: 0.8;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin: 2rem 0;
        }
        
        .stat-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 1.5rem;
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 245, 255, 0.3);
        }
        
        .stat-number {
            font-size: 2.5rem;
            font-weight: bold;
            color: #00f5ff;
            margin-bottom: 0.5rem;
        }
        
        .stat-label {
            font-size: 1rem;
            opacity: 0.9;
        }
        
        .agents-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
            margin: 2rem 0;
        }
        
        .agent-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 1.5rem;
            transition: all 0.3s ease;
        }
        
        .agent-card:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(0, 245, 255, 0.2);
        }
        
        .agent-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }
        
        .agent-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: #ffffff;
        }
        
        .agent-status {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.8rem;
        }
        
        .status-badge {
            padding: 0.2rem 0.6rem;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 500;
            text-transform: uppercase;
        }
        
        .status-active { background: #00ff0040; color: #00ff00; border: 1px solid #00ff00; }
        .status-idle { background: #ffaa0040; color: #ffaa00; border: 1px solid #ffaa00; }
        .status-error { background: #ff004040; color: #ff0040; border: 1px solid #ff0040; }
        
        .agent-description {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-bottom: 1rem;
            line-height: 1.4;
        }
        
        .agent-actions {
            display: flex;
            gap: 0.5rem;
        }
        
        .btn {
            padding: 0.4rem 1rem;
            border: none;
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }
        
        .btn-primary {
            background: linear-gradient(45deg, #00f5ff, #0099ff);
            color: white;
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 245, 255, 0.4);
        }
        
        .footer {
            text-align: center;
            padding: 2rem 0;
            margin-top: 3rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .footer p {
            opacity: 0.6;
            font-size: 0.9rem;
        }
        
        .last-updated {
            font-size: 0.8rem;
            opacity: 0.5;
            margin-top: 0.5rem;
        }
    </style>
</head>

        // Render agents
        function renderAgents() {
            const agentsGrid = document.getElementById('agents-grid');
            agentsGrid.innerHTML = '';
            
            genesisAgents.forEach(agent => {
                const agentCard = document.createElement('div');
                agentCard.className = 'agent-card';
                
                const statusClass = `status-${agent.status}`;
                const statusText = agent.status.charAt(0).toUpperCase() + agent.status.slice(1);
                
                agentCard.innerHTML = `
                    <div class="agent-header">
                        <div class="agent-name">${agent.name}</div>
                        <div class="agent-status">
                            <span class="status-badge ${statusClass}">${statusText}</span>
                        </div>
                    </div>
                    <div class="agent-description">${agent.description}</div>
                    <div class="agent-actions">
                        <a href="https://platform.agpt.co/library/agents/${agent.id}" class="btn btn-primary" target="_blank">View Agent</a>
                        <button class="btn btn-secondary" onclick="runAgent('${agent.id}')">Execute</button>
                    </div>
                `;
                
                agentsGrid.appendChild(agentCard);
            });
        }
        
        // Mock function for running agents
        function runAgent(agentId) {
            alert(`Executing agent: ${agentId}\n\nThis would normally trigger the agent execution via AutoGPT API.`);
        }
        
        // Update last updated time
        function updateLastUpdated() {
            const now = new Date();
            const formatted = now.toLocaleString('nl-NL', {
                year: 'numeric',
                month: '2-digit', 
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
            document.getElementById('last-updated').textContent = formatted;
        }
        
        // Update stats based on agent statuses
        function updateStats() {
            const activeCount = genesisAgents.filter(a => a.status === 'active').length;
            const idleCount = genesisAgents.filter(a => a.status === 'idle').length;
            const errorCount = genesisAgents.filter(a => a.status === 'error').length;
            
            const statCards = document.querySelectorAll('.stat-card .stat-number');
            statCards[1].textContent = activeCount;
            statCards[2].textContent = idleCount; 
            statCards[3].textContent = errorCount;
        }
        
        // Initialize dashboard
        document.addEventListener('DOMContentLoaded', function() {
            renderAgents();
            updateStats();
            updateLastUpdated();
            
            // Update every 30 seconds
            setInterval(() => {
                updateLastUpdated();
                // In a real implementation, this would fetch fresh data
            }, 30000);
        });
